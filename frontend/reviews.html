<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Reviews — Zynex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule defer src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="script.js" defer></script>
    <script type="module" src="firebase-init.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <aside class="sidebar" aria-label="Sidebar">
        <div class="brand"><a href="index.html">Zynex</a></div>

        <ul class="nav-list">
            <li><a href="index.html"><ion-icon name="grid-outline"></ion-icon>Dashboard</a></li>
            <li><a href="services.html"><ion-icon name="cube-outline"></ion-icon>Services</a></li>
            <li><a href="orders.html"><ion-icon name="notifications-outline"></ion-icon>Orders</a></li>
            <li><a href="giveaway.html"><ion-icon name="gift-outline"></ion-icon>Giveaway</a></li>
            <li><a class="active" href="reviews.html"><ion-icon name="star-outline"></ion-icon>Reviews</a></li>
        </ul>

        <div class="section-title">AUTH</div>
        <ul class="nav-list">
            <li><a href="account.html"><ion-icon name="person-outline"></ion-icon>Profile</a></li>
        </ul>

        <div id="admin-section-title" class="section-title" style="display:none">ADMIN</div>
        <ul id="admin-nav-list" class="nav-list" style="display:none">
            <li><a href="admin.html"><ion-icon name="server-outline"></ion-icon>Server <span id="admin-sidebar-badge" class="nav-badge">0</span></a></li>
        </ul>
    </aside>

    <header class="topbar">
        <div class="left-controls">
            <button class="hamburger" aria-label="Open menu" onclick="togglePanel()"><ion-icon name="menu-outline"></ion-icon></button>
            <div id="headerAuthArea"></div>
        </div>
        <div class="controls">
            <button onclick="openPopup('.help-popup')"><ion-icon name="help-circle-outline"></ion-icon>Help</button>
        </div>
    </header>

    <main class="content">
        <div style="margin-top:88px"></div>
        
        <div class="reviews-header-banner">
            <div class="reviews-title-area">
                <h2>Customer Reviews</h2>
                <p>See what our users have to say about Zynex.</p>
                <button class="cta" onclick="openReviewPopup()" style="margin-top: 15px;"><ion-icon name="create-outline"></ion-icon> Write a Review</button>
            </div>
            <div class="reviews-summary-card">
                <div class="rating-number" id="avg-rating-number">--</div>
                <div class="star-rating-display" id="avg-rating-stars">
                    <ion-icon name="star-outline"></ion-icon>
                    <ion-icon name="star-outline"></ion-icon>
                    <ion-icon name="star-outline"></ion-icon>
                    <ion-icon name="star-outline"></ion-icon>
                    <ion-icon name="star-outline"></ion-icon>
                </div>
                <div class="total-reviews" id="total-reviews-count">Loading reviews...</div>
            </div>
        </div>
        
        <!-- Reviews Grid Container -->
        <div id="all-reviews-grid" class="reviews-grid" style="max-width: 1000px; margin: 0 auto;">
            <p style="text-align:center; width:100%; color:#999; grid-column: 1 / -1;">Loading reviews...</p>
        </div>
    </main>

    <div class="popup help-popup" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="popup-content help">
            <button class="close-icon" aria-label="Close" onclick="closePopup('.help-popup')">&times;</button>
            <script>
                document.addEventListener('DOMContentLoaded', () => {
                    const check = setInterval(() => { if(window.openSupportCenter) { window.openSupportCenter(); clearInterval(check); } }, 100);
                });
            </script>
        </div>
    </div>

    <div class="popup review-popup" aria-hidden="true">
        <div class="popup-content" style="max-width: 400px;">
            <button class="close-icon" onclick="closePopup('.review-popup')">&times;</button>
            <h2 style="text-align: center;">Write a Review</h2>
            <div class="star-rating-input">
                <ion-icon name="star-outline" data-value="1" onclick="setRating(1)"></ion-icon>
                <ion-icon name="star-outline" data-value="2" onclick="setRating(2)"></ion-icon>
                <ion-icon name="star-outline" data-value="3" onclick="setRating(3)"></ion-icon>
                <ion-icon name="star-outline" data-value="4" onclick="setRating(4)"></ion-icon>
                <ion-icon name="star-outline" data-value="5" onclick="setRating(5)"></ion-icon>
            </div>
            <input type="hidden" id="review-rating-value" value="0">
            <textarea id="review-text" class="form-input" placeholder="Share your experience..." style="width:100%; height:100px; margin-top:15px; resize: none;"></textarea>
            <button class="cta" onclick="submitReview()" style="width:100%; margin-top:15px">Submit Review</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const check = setInterval(() => { if (window.loadAllReviews) { window.loadAllReviews(); clearInterval(check); } }, 100);
        });
    </script>
</body>
</html>
